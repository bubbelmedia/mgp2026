name = "mgp2026-admin"
main = "worker.js"
compatibility_date = "2025-01-01"

# Non-secret config. Adjust if you fork the repo or rename the file.
[vars]
GITHUB_OWNER = "BubbelMedia"
GITHUB_REPO = "mgp2026"
