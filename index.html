<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ziggo MotoGP Production</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/tabler-icons.min.css"/>
<style>
@keyframes rec-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(.88)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
*{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{--bg:#f2f2f5;--bg1:#ffffff;--bg2:#f8f8fa;--bg3:#ededf0;--bg4:#e4e4e8;--border:rgba(0,0,0,0.08);--shadow:0 1px 3px rgba(0,0,0,0.07);--txt:#111827;--txt2:#6b7280;--txt3:#9ca3af;--card-bg:#ffffff;--stat-bg:#f8f8fa;}
[data-theme="dark"]{--bg:#0e0e12;--bg1:#16161b;--bg2:#1c1c22;--bg3:#242429;--bg4:#2c2c33;--border:rgba(255,255,255,0.08);--shadow:0 1px 4px rgba(0,0,0,0.3);--txt:#ffffff;--txt2:#b8c5d6;--txt3:#7a8594;--card-bg:#16161b;--stat-bg:#1c1c22;}
:root{--acc:#f97316;--acc-dim:rgba(249,115,22,0.10);--acc-border:rgba(249,115,22,0.30);--live:#dc2626;--live-dim:rgba(220,38,38,0.10);--live-border:rgba(220,38,38,0.32);--green:#16a34a;--green-dim:rgba(22,163,74,0.12);--blue:#2563eb;--blue-dim:rgba(37,99,235,0.12);--yellow:#ca8a04;--yellow-dim:rgba(202,138,4,0.12);--purple:#7c3aed;--purple-dim:rgba(124,58,237,0.12);}
html,body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;transition:background .2s,color .2s}
#app{max-width:680px;margin:0 auto;min-height:100vh;background:var(--bg)}

/* RACE TOP NAV */
.race-nav{background:linear-gradient(180deg,#fb923c 0%,#f97316 50%,#ea6a0a 100%);border-bottom:1px solid rgba(0,0,0,0.15);display:flex;align-items:stretch;position:sticky;top:0;z-index:40;box-shadow:0 3px 20px rgba(249,115,22,0.45),inset 0 1px 0 rgba(255,255,255,0.25),inset 0 -1px 0 rgba(0,0,0,0.15);}
.race-tabs{display:flex;flex:1;overflow:hidden;gap:2px;padding:0 2px;}
.race-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px 8px 3px;font-size:11px;font-weight:800;color:rgba(255,255,255,0.6);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;gap:1px;transition:all .15s;white-space:nowrap;flex:1;min-width:0;}
.race-tab .rt-flag{font-size:15px;line-height:1.1}
.race-tab .rt-info{display:flex;align-items:baseline;gap:3px;}
.race-tab .rt-label{font-size:9px;font-weight:800;opacity:.85}
.race-tab .rt-round{font-size:9px;font-weight:700;opacity:.85}
.race-tab.active{color:#fff;border-bottom-color:transparent;position:relative;}
.race-tab.active::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:3px;background:#fff;border-radius:2px 2px 0 0;}
.race-tab.active .rt-label,.race-tab.active .rt-round{opacity:1}
.race-tab:hover:not(.active){color:#fff;background:rgba(0,0,0,0.10)}
.race-tab.tab-onsite{outline:none;border-radius:5px;position:relative;}
.race-tab.tab-onsite::before{content:'';position:absolute;left:3px;right:3px;top:4px;bottom:4px;border:1px solid rgba(255,255,255,0.55);border-radius:4px;pointer-events:none;}
.race-tab.tab-onsite.active::before{border-color:rgba(255,255,255,0.95);}
.race-tab.tab-onsite .rt-label,.race-tab.tab-onsite .rt-round,.race-tab.tab-onsite .rt-flag{color:#fff;opacity:1;}
.race-tab.tab-remote{opacity:.5;}

/* DROPDOWN BUTTON */
.dd-wrap{position:relative;display:flex;align-items:stretch;flex-shrink:0;border-left:1px solid rgba(255,255,255,0.25);}
.dd-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 12px 10px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.75);transition:all .15s;white-space:nowrap;border-bottom:3px solid transparent;}
.dd-btn:hover,.dd-btn.open{color:#fff;background:rgba(0,0,0,0.12);}
.dd-btn.open{border-bottom-color:rgba(255,255,255,0.5);}
.dd-btn-label{font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
.dd-chevron{font-size:12px;transition:transform .2s;}
.dd-btn.open .dd-chevron{transform:rotate(180deg);}

/* DROPDOWN PANEL */
.dd-panel{display:none;position:absolute;top:calc(100% + 1px);right:0;width:240px;background:var(--card-bg);border:1px solid var(--border);border-radius:0 0 14px 14px;box-shadow:0 12px 32px rgba(0,0,0,0.18);z-index:100;overflow:hidden;animation:fadeIn .15s ease;max-height:calc(100svh - 80px);overflow-y:auto;}
.dd-panel.open{display:block;}
.dd-section-label{font-size:9px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;padding:10px 14px 5px;}
.dd-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .1s;border:none;background:none;width:100%;text-align:left;}
.dd-item:hover{background:var(--bg2);}
.dd-item.active-race{background:var(--acc-dim);}
.dd-item-flag{font-size:16px;flex-shrink:0;}
.dd-item-info{flex:1;min-width:0;}
.dd-item-name{font-size:12px;font-weight:700;color:var(--txt);}
.dd-item-sub{font-size:10px;color:var(--txt3);margin-top:1px;}
.dd-item-round{font-size:10px;font-weight:700;color:var(--txt3);flex-shrink:0;}
.dd-item.active-race .dd-item-name{color:var(--acc);}
.dd-item.active-race .dd-item-round{color:var(--acc);}
.dd-divider{height:1px;background:var(--border);margin:4px 0;}
.dd-item.done-race{opacity:.5;}
.dd-item.done-race:hover{opacity:.8;}
.dd-item.onsite-race{outline:1px solid var(--acc-border);outline-offset:-2px;border-radius:10px;}
.dd-item.remote-race{opacity:.55;}
.dd-onsite-pill{display:inline-flex;align-items:center;font-size:8px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--acc);border:1px solid var(--acc-border);border-radius:3px;padding:1px 4px;flex-shrink:0;line-height:1.3;}
.rt-onsite{display:inline-block;font-size:7px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,0.9);border:1px solid rgba(255,255,255,0.5);border-radius:3px;padding:1px 4px;line-height:1.3;margin-top:1px;}

.theme-toggle{display:flex;align-items:center;justify-content:center;width:42px;flex-shrink:0;background:none;border:none;border-left:1px solid rgba(255,255,255,0.25);cursor:pointer;color:rgba(255,255,255,0.7);transition:color .15s;}
.theme-toggle:hover{color:#fff}

/* ADMIN LOGIN */
.admin-section{display:flex;align-items:center;gap:8px;padding:0 8px;border-left:1px solid rgba(255,255,255,0.25);}
.time-display{font-size:10px;font-weight:600;color:rgba(255,255,255,0.8);min-width:35px;text-align:right;}
.admin-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.7);transition:all .15s;border-radius:6px;padding:0;}
.admin-btn:hover{color:#fff;background:rgba(0,0,0,0.15)}
.admin-btn svg{width:16px;height:16px;}

.admin-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;animation:fadeIn .2s ease;}
.admin-modal.open{display:flex;align-items:center;justify-content:center;padding:20px;}
.admin-modal-content{background:var(--card-bg);border-radius:16px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);display:flex;flex-direction:column;}
.admin-modal-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.admin-modal-title{font-size:16px;font-weight:700;color:var(--txt);}
.admin-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--txt2);transition:color .15s;padding:0;}
.admin-close:hover{color:var(--txt)}
.admin-modal-body{padding:20px;display:flex;flex-direction:column;gap:15px;flex:1;}
.admin-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg1);color:var(--txt);font-size:14px;font-family:inherit;}
.admin-input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-dim)}
.admin-textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg1);color:var(--txt);font-size:14px;font-family:monospace;min-height:120px;resize:vertical;}
.admin-textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-dim)}
.admin-button-group{display:flex;gap:10px;}
.admin-btn-primary{flex:1;padding:10px 16px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:background .15s;}
.admin-btn-primary:hover:not(:disabled){background:#f87f1f}
.admin-btn-primary:disabled{opacity:.5;cursor:not-allowed}
.admin-btn-voice{flex:1;padding:10px 16px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.admin-btn-voice:hover:not(:disabled){background:#1d4ed8}
.admin-btn-voice:disabled{opacity:.5;cursor:not-allowed}
.admin-btn-voice.recording{background:#dc2626;animation:rec-pulse .8s infinite}
.admin-status{padding:10px 12px;border-radius:8px;font-size:12px;font-weight:600;line-height:1.4;}
.admin-status.success{background:var(--green-dim);color:var(--green);border:1px solid rgba(22,163,74,.2)}
.admin-status.error{background:rgba(220,38,38,0.1);color:#dc2626;border:1px solid rgba(220,38,38,.3)}
.admin-status.info{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(37,99,235,.2)}
.admin-label{font-size:12px;font-weight:600;color:var(--txt);margin-bottom:4px;display:block;}

/* SUB NAV */
.sub-nav{display:flex;border-bottom:2px solid var(--border);background:var(--bg1);position:sticky;top:var(--nav-h,0px);z-index:30;overflow-x:auto;scrollbar-width:none;}
.sub-nav::-webkit-scrollbar{display:none}
.sub-btn{display:flex;align-items:center;gap:5px;padding:6px 10px 5px;font-size:12.6px;font-weight:700;color:var(--txt);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.sub-btn.active{color:var(--acc);border-bottom-color:var(--acc)}
.sub-btn:hover:not(.active){color:var(--txt);background:var(--bg2)}

/* LIVE BAR */
.live-bar{display:flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(220,38,38,0.08);border-bottom:1px solid rgba(220,38,38,0.18);font-size:11px;font-weight:600;color:#fff;min-height:30px;}
.live-bar.idle{background:#e8e8ec;border-bottom:1px solid #d4d4d9;}
.live-bar-label{font-size:9px;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
.live-bar-session{flex:1;color:#fff;font-weight:600;font-size:11px;}
.live-bar.idle .live-bar-label{color:#888898;}
.live-bar.idle .live-bar-session{color:#333340;font-weight:500;}

/* CONTENT & CARDS */
.content{padding:6px 12px 12px;display:flex;flex-direction:column;gap:10px;animation:fadeIn .2s ease}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:14px;overflow:hidden;box-shadow:var(--shadow);transition:background .2s,border-color .2s}
.collapse-header{display:flex;align-items:center;justify-content:space-between;padding:10px;background:var(--bg3);border-radius:10px;cursor:pointer;user-select:none;transition:all .2s;margin-bottom:0;border:1px solid rgba(0,0,0,0.70)}
.collapse-header:hover{background:var(--bg4)}
.collapse-header-title{font-size:12px;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:6px}
.collapse-chevron{font-size:14px;transition:transform .2s;color:var(--acc)}
.collapse-chevron.open{transform:rotate(180deg)}
.collapse-content{display:none;padding:12px 0;max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapse-content.open{display:block;max-height:2000px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:6px}
.gp-hero{background:var(--card-bg);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;transition:background .2s}
.gp-round{font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.gp-name{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:2px}
.gp-loc{font-size:11px;color:var(--txt2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-acc{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-border)}
.b-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(22,163,74,.2)}
.b-blue{background:var(--bg3);color:var(--txt2);border:1px solid var(--border)}
.b-yellow{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(202,138,4,.2)}
.b-gray{background:var(--bg3);color:var(--txt2);border:1px solid var(--border)}
.b-motogp{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-border);font-weight:700}
.b-ziggo{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-border);font-weight:700}
.b-purple{background:var(--bg3);color:var(--txt2);border:1px solid var(--border)}

/* LIVE PILL */
.rec-dot{width:9px;height:9px;border-radius:50%;background:var(--live);animation:rec-pulse 1.4s ease-in-out infinite;display:inline-block;flex-shrink:0}
.live-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px 3px 6px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.04em;background:var(--live-dim);color:var(--live);border:1px solid var(--live-border);text-transform:uppercase}

/* SCHEDULE */
.sched-row.motogp-featured:not(.done):not(.live){border:1.5px solid rgba(220,38,38,0.55)!important;background:rgba(220,38,38,0.04)!important;}
.sched-row.motogp-featured .sched-time{color:var(--live)!important}
.sched-row.motogp-featured .sched-name{color:var(--txt);font-weight:600}
.day-header{font-size:13px;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:.09em;padding:6px 10px;border-bottom:1px solid var(--border);margin-bottom:4px;background:var(--bg3);border-radius:8px 8px 0 0;}
.sched-section{margin-bottom:4px}
.sched-row{display:flex;align-items:center;gap:10px;padding:3px 10px;border-radius:8px;margin-bottom:1px;position:relative;overflow:hidden;background:transparent;border:1px solid transparent}
.sched-time{min-width:90px;font-size:12px;font-weight:700;font-family:monospace;color:var(--txt);display:flex;align-items:baseline;gap:0;flex-shrink:0;}
.sched-name{flex:1;font-size:12px;font-weight:500;color:var(--txt2)}
.sched-end{font-size:10px;color:var(--txt3);font-family:monospace;white-space:nowrap}
.sched-row:not(.done):not(.italic-row) .sched-end{color:var(--txt)}
.sched-row.done{opacity:.3}
.sched-row.upcoming-next{background:rgba(37,99,235,.06);border-color:rgba(37,99,235,.2)}
.sched-row.upcoming-next .sched-time{color:var(--blue);font-weight:800}
.sched-row.upcoming-next .sched-name{color:var(--txt);font-weight:600}
.sched-row.live{background:var(--live-dim);border:1.5px solid var(--live);box-shadow:0 0 10px rgba(220,38,38,.12)}
.sched-row.live::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--live);border-radius:3px 0 0 3px}
.sched-row.live .sched-time{color:var(--live);font-weight:800}
.sched-row.live .sched-name{color:var(--txt);font-weight:700}
.sched-row.broadcaster .sched-time{color:var(--txt)}
.sched-row.broadcaster .sched-name{color:var(--txt)}
.sched-row.broadcaster.done{opacity:.3}
.sched-row.gp-race:not(.done):not(.live){background:var(--acc-dim);border-color:var(--acc-border)}
[data-theme="dark"] .live-bar.idle{background:#2a2a32;border-bottom-color:#3a3a45;}
[data-theme="dark"] .live-bar.idle .live-bar-label{color:#6b6b80;}
[data-theme="dark"] .live-bar.idle .live-bar-session{color:#c8c8d8;}
.sched-row.gp-race:not(.done):not(.live) .sched-time{color:var(--acc)}
.sched-row.gp-race:not(.done):not(.live) .sched-name{color:var(--txt);font-weight:600}
.sched-row.italic-row .sched-name{font-style:italic;color:var(--txt3);font-size:11px}
.sched-row.italic-row .sched-time{color:var(--txt3)}

/* CREW */
.crew-namelist{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--card-bg)}
.crew-namerow{display:flex;align-items:center;gap:10px;padding:11px 14px;background:none;border:none;border-bottom:1px solid var(--border);cursor:pointer;text-align:left;transition:background .12s;width:100%}
.crew-namerow:last-child{border-bottom:none}
.crew-namerow:hover{background:var(--bg2)}
.crew-nl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.crew-nl-name{font-size:13px;font-weight:700;color:var(--txt);flex:1}
.crew-nl-role{font-size:10px;color:var(--txt3);white-space:nowrap;flex-shrink:0}
.crew-section-header{font-size:12px;font-weight:800;color:var(--txt);text-transform:uppercase;letter-spacing:.06em;padding:10px 0 6px;border-bottom:2px solid var(--acc-border);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.crew-gp-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.crew-gp-header{background:var(--acc-dim);border-bottom:1px solid var(--acc-border);padding:10px 14px}
.crew-gp-title{font-size:12px;font-weight:700;color:var(--txt)}
.crew-gp-body{padding:12px 14px;display:flex;flex-direction:column;gap:7px}
.assign-row{display:flex;align-items:baseline;gap:8px;font-size:12px}
.assign-role{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;min-width:100px;flex-shrink:0}
.assign-names{color:var(--txt2);flex:1;line-height:1.45}

/* FLIGHT */
.flight-block{background:var(--bg2);border-radius:12px;padding:12px;margin-bottom:10px}
.flight-block:last-child{margin-bottom:0}
.flight-block.orange{border:1.5px solid var(--acc-border);box-shadow:0 2px 8px rgba(249,115,22,.08)}
.flight-block.blue{border:1.5px solid rgba(37,99,235,.25);box-shadow:0 2px 8px rgba(37,99,235,.06)}

/* TRAVEL */
.map-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--blue);text-decoration:none;padding:4px 9px;background:var(--blue-dim);border-radius:20px;margin-top:8px;border:1px solid rgba(37,99,235,.2)}
.map-link:hover{opacity:.8}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.stat-item{background:var(--stat-bg);border-radius:8px;padding:8px 10px;border:1px solid var(--border)}
.stat-label{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em}
.stat-val{font-size:12px;font-weight:600;color:var(--txt);margin-top:2px}

/* CALENDAR */
.cal-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);margin-bottom:6px}
.cal-card:hover{border-color:var(--acc-border)}
.cal-card.current{border-color:var(--acc-border);background:var(--acc-dim)}
.cal-card.done{opacity:.5;box-shadow:none}
.cal-card.done:hover{opacity:.8}
.cal-round{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;background:var(--bg3);color:var(--txt2);margin-top:1px}
.cal-card.current .cal-round{background:var(--acc);color:#fff}
.cal-main{flex:1;min-width:0}
.cal-name{font-size:12px;font-weight:600;color:var(--txt)}
.cal-sub{font-size:10px;color:var(--txt2);margin-top:1px}
.cal-winners{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.cal-winner{font-size:10px;padding:2px 7px;border-radius:12px;font-weight:500}
.w-m3{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(124,58,237,.2)}

/* ─── STATE ─── */
let activeRace='ita', activeSub='home', schedSubTab='schema';
// Tracks manual day-collapse overrides: key = 'raceId-dayIndex', value = true (open) / false (closed)
const userToggledDays={};

/* ─── INIT ─── */
function init(){
  buildRaceTabs();
  updateLiveBar();
  render();
  function tickSubnavClock(){const el=document.getElementById('subnav-clock');if(el){const n=new Date();el.textContent=pad(n.getHours())+':'+pad(n.getMinutes());}};
  function updateTimestamp(){const el=document.getElementById('current-timestamp');if(el){const n=new Date();const d=pad(n.getDate()),m=String(n.getMonth()+1).padStart(2,'0'),y=n.getFullYear(),h=pad(n.getHours()),min=pad(n.getMinutes());el.textContent='current: '+d+'/'+m+'/'+y+' '+h+':'+min;}};
  tickSubnavClock();
  // updateTimestamp(); // Disabled - using hardcoded time instead
  setInterval(()=>{updateLiveBar();if(activeSub==='schedule')renderSchedulePanel();tickSubnavClock();},30000);
  setInterval(tickSubnavClock,10000);
}

function buildRaceTabs(){
  // next 4 upcoming (or current) races from the full calendar
  const upcoming=ALL_CAL.filter(r=>!r.done);
  const tabRaces=upcoming.slice(0,4);
  document.getElementById('race-tabs').innerHTML=tabRaces.map(cal=>{
    const race=RACES.find(r=>r.id===cal.id);
    const isActive=cal.id===activeRace;
    const isCurrent=cal.current;
    const isOnsite=!!race;
    // Short country name: strip "GP van ", "TT van ", "GP " prefixes
    const shortName=(race?.name||cal.name).replace(/^(GP van |TT van |GP )/,'');
    const onsiteCls=isOnsite?' tab-onsite':((!cal.current)?' tab-remote':'');
    return`<button class="race-tab${isActive?' active':''}${onsiteCls}" onclick="selectTabRace('${cal.id}',this)">
      <span class="rt-flag">${cal.flag}</span>
      <span class="rt-info"><span class="rt-label">${cal.round}</span><span class="rt-round">${shortName}</span></span>
    </button>`;
  }).join('');
  buildDropdown();
}

function buildDropdown(){
  const onsiteIds=RACES.map(r=>r.id);
  const upcoming=ALL_CAL.filter(r=>!r.done);
  const done=ALL_CAL.filter(r=>r.done);
  let html=`<div class="dd-section-label">Komende races</div>`;
  upcoming.forEach(e=>{
    const isOnsite=onsiteIds.includes(e.id);
    const isActive=e.id===activeRace;
    const ddCls=(isActive?' active-race':'')+(isOnsite?' onsite-race':' remote-race');
    html+=`<button class="dd-item${ddCls}" onclick="ddSelectRace('${e.id}')">
      <span class="dd-item-flag">${e.flag}</span>
      <div class="dd-item-info"><div class="dd-item-name">${e.name}</div><div class="dd-item-sub">${e.dates}</div></div>
      ${isOnsite?'<span class="dd-onsite-pill">onsite</span>':''}
      <span class="dd-item-round">${e.round}</span>
    </button>`;
  });
  html+=`<div class="dd-divider"></div><div class="dd-section-label">Afgerond</div>`;
  done.forEach(e=>{
    const isDoneOnsite=onsiteIds.includes(e.id)||e.onsite;
    html+=`<button class="dd-item done-race${isDoneOnsite?' onsite-race':''}" onclick="ddSelectRace('${e.id}')">
      <span class="dd-item-flag">${e.flag}</span>
      <div class="dd-item-info"><div class="dd-item-name">${e.name}</div><div class="dd-item-sub">${e.dates}</div></div>
      ${isDoneOnsite?'<span class="dd-onsite-pill">onsite</span>':''}
      <span class="dd-item-round">${e.round}</span>
    </button>`;
  });
  const panel=document.getElementById('dd-panel');
  if(panel)panel.innerHTML=html;
}

function toggleDropdown(){
  const btn=document.getElementById('dd-btn');
  const panel=document.getElementById('dd-panel');
  if(!btn||!panel)return;
  const isOpen=panel.classList.contains('open');
  if(isOpen){panel.classList.remove('open');btn.classList.remove('open');}
  else{panel.classList.add('open');btn.classList.add('open');}
}

function closeDropdown(){
  const btn=document.getElementById('dd-btn');
  const panel=document.getElementById('dd-panel');
  if(btn)btn.classList.remove('open');
  if(panel)panel.classList.remove('open');
}

function ddSelectRace(id){
  closeDropdown();
  const race=RACES.find(r=>r.id===id);
  if(race){
    activeRace=id; activeSub='home'; schedSubTab='schema';
    buildRaceTabs();
    document.querySelectorAll('.sub-btn').forEach(b=>b.classList.toggle('active',b.dataset.sub==='home'));
    updateLiveBar(); render(); window.scrollTo(0,0);
  } else {
    buildRaceTabs();
    activeSub='calendar';
    document.querySelectorAll('.sub-btn').forEach(b=>b.classList.toggle('active',b.dataset.sub==='calendar'));
    render(); window.scrollTo(0,0);
  }
}

document.addEventListener('click',e=>{
  const wrap=document.querySelector('.dd-wrap');
  if(wrap&&!wrap.contains(e.target))closeDropdown();
});

function selectTabRace(id, btn){
  document.querySelectorAll('.race-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const race=RACES.find(r=>r.id===id);
  if(race){
    activeRace=id; activeSub='home'; schedSubTab='schema';
    document.querySelectorAll('.sub-btn').forEach(b=>b.classList.toggle('active',b.dataset.sub==='home'));
    buildDropdown(); updateLiveBar(); render(); window.scrollTo(0,0);
  } else {
    activeSub='calendar';
    document.querySelectorAll('.sub-btn').forEach(b=>b.classList.toggle('active',b.dataset.sub==='calendar'));
    render(); window.scrollTo(0,0);
  }
}

function switchRace(id,btn){
  activeRace=id; activeSub='home'; schedSubTab='schema';
  document.querySelectorAll('.race-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.sub-btn').forEach(b=>b.classList.toggle('active',b.dataset.sub==='home'));
  buildDropdown();
  updateLiveBar(); render(); window.scrollTo(0,0);
}

function switchSub(sub,btn){
  activeSub=sub;
  document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const bar=document.getElementById('global-live-bar');
  if(bar)bar.style.display=(sub==='home'||sub==='schedule')?'':'none';
  render(); window.scrollTo(0,0);
}

function render(){
  const race=RACES.find(r=>r.id===activeRace);
  const el=document.getElementById('main-content');
  if(!race)return;
  switch(activeSub){
    case'home':     el.innerHTML=renderHome(race); loadWeather(race); break;
    case'schedule': el.innerHTML=renderScheduleWrapper(race); renderSchedulePanel(); break;
    case'crew':     el.innerHTML=renderCrew(race); break;
    case'travel':   el.innerHTML=renderTravel(race); break;

    case'calendar': el.innerHTML=renderCalendar(); break;
  }
}

/* ─── HOME ─── */
function renderHome(race){
  const crewPill=(id,isGuest=false)=>{const c=CREW[id];if(!c)return'';
    const initials=c.name.split(' ').map(w=>w[0]).slice(0,2).join('');

  };
  const names=race.onsite.map(id=>crewPill(id)).join('')+(race.id==='ita'?crewPill('valerio',true):'');
  const circuitSvg="";
  const statusBanner=race.current
    ?`<div class="current-banner" style="flex-direction:column;align-items:stretch;gap:0;padding:0;overflow:hidden">
        <div style="display:flex;align-items:center;gap:10px;padding:12px 14px 10px;position:relative">
          <span class="current-banner-dot"></span>
          <span style="font-size:32px;line-height:1;flex-shrink:0">${race.flag}</span>
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--acc)">Huidig weekend — Onsite</div>
            <div style="font-size:11px;color:var(--txt2);margin-top:1px">${race.dates} · ${race.circuit}</div>
          </div>
          ${race.coords?`<a href="https://www.google.com/maps/search/?api=1&query=${race.coords[0]},${race.coords[1]}" target="_blank" style="position:absolute;top:10px;right:12px;display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--blue);text-decoration:none;background:var(--blue-dim);border:1px solid rgba(37,99,235,.2);border-radius:20px;padding:3px 9px;"><i class="ti ti-map-pin" style="font-size:11px"></i>Maps</a>`:''}
        </div>
        ${(()=>{const race2=race;const now2=Date.now();let next2=null;for(const s of race2.sched){if(s[6]==='i'||s[6]==='b'||s[6]==='bt')continue;if(s[1]!=='b-motogp'&&s[1]!=='b-purple'&&s[1]!=='b-blue')continue;const st=getState(race2,s,now2);if(st==='live'||st==='upcoming'){next2=s;break;}}if(!next2)return'';const isLive2=getState(race2,next2,now2)==='live';const ts2=pad(next2[3])+':'+pad(next2[4]);const endT2=fmtEnd(race2,next2);const dayLabel2=(()=>{const st=sStart(race2,next2);const d=new Date(st);const days2=['Zo','Ma','Di','Wo','Do','Vr','Za'];return days2[d.getDay()]+' '+d.getDate()+' '+['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][d.getMonth()];})();
return'<div style="border-top:1px solid var(--acc-border);padding:6px 14px 8px;display:flex;align-items:center;gap:5px;overflow:hidden;white-space:nowrap">'+(isLive2?'<span class="live-pill" style="font-size:9px;padding:2px 7px;flex-shrink:0"><span class="rec-dot" style="width:5px;height:5px"></span>LIVE</span>':'<span style="font-size:9px;font-weight:700;background:var(--live-dim);color:var(--live);border:1px solid var(--live-border);border-radius:20px;padding:2px 7px;flex-shrink:0">Next session</span>')+'<span style="font-size:11px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0">'+next2[0]+'</span><span style="font-size:10px;font-weight:700;color:#111;flex-shrink:0">'+dayLabel2+'</span><span style="font-size:10px;color:var(--txt3);flex-shrink:0">·</span><span style="font-size:11px;font-weight:700;color:var(--txt);font-family:monospace;flex-shrink:0">'+ts2+(endT2?' → '+endT2:'')+'</span></div>';})()}

  // Build dynamic weekoverzicht from schedule data
  function buildWeekOverzicht(race){
    const hdrNames=race.schedHdr||[];
    // Group non-'i' sessions by dayIndex
    const days={};
    race.sched.forEach(s=>{
      const di=s[2];
      if(s[6]==='i')return; // skip info-only sessions
      if(!days[di])days[di]=[];
      days[di].push(s);
    });

      const sessions=race.sched.filter(s=>s[2]===i&&s[6]!=='i'&&s[6]!=='b');
      if(i===0){
        // Thursday: media day, no track sessions usually
        {const parts=hdr.split(' ');const dn=parts[0];const ds=parts.slice(1).join(' ');
        return`<div class="week-day"><div class="week-day-label"><div class="week-day-name wov-day">${dn}</div><div class="week-day-date wov-sub">${ds}</div></div><div class="week-day-items"><div class="week-item"><div class="week-item-icon" style="background:rgba(124,58,237,.1)">🎤</div><div><div style="font-size:12px;font-weight:600;color:#000" class="wov-txt">Media-dag</div><div style="font-size:10px;color:#000" class="wov-sub">Track familiarisatie · Persconferentie</div></div></div></div></div>`;}
      }
      if(sessions.length===0)return'';
      // First real session (non-broadcaster)
      const first=sessions[0];
      const last=sessions[sessions.length-1];
      const fTime=`${pad(first[3])}:${pad(first[4])}`;
      // Last session end time
      const lEndMin=last[3]*60+last[4]+last[5];
      const lEndH=Math.floor(lEndMin/60),lEndM=lEndMin%60;
      const lEndStr=`${pad(lEndH)}:${pad(lEndM)}`;
      // Broadcaster set: 30min after last session end
      const bsStartMin=lEndMin+30;
      const bsH=Math.floor(bsStartMin/60),bsM=bsStartMin%60;
      const bsStart=`${pad(bsH)}:${pad(bsM)}`;
      const bsEnd=`${pad(Math.floor((bsStartMin+30)/60))}:${pad((bsStartMin+30)%60)}`;
      // Is race day (has 'g' session)?
      const isRaceDay=sessions.some(s=>s[6]==='g');
      const emoji=isRaceDay?'🏆':'🏍️';
      {const parts=hdr.split(' ');const dn=parts[0];const ds=parts.slice(1).join(' ');
      return`<div class="week-day"><div class="week-day-label"><div class="week-day-name wov-day">${dn}</div><div class="week-day-date wov-sub">${ds}</div></div><div class="week-day-items">
        <div class="week-item"><div class="week-item-icon" style="background:rgba(100,100,100,.08)">${emoji}</div><div><div style="font-size:12px;font-weight:700" class="wov-txt">${fTime} – ${lEndStr}</div><div style="font-size:10px" class="wov-sub">${isRaceDay?'Race dag · Moto3 · Moto2 · MotoGP':'Sessies · Moto3 · Moto2 · MotoGP'}</div></div></div>
        <div class="week-item"><div class="week-item-icon" style="background:rgba(249,115,22,.1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg></div><div><div style="font-size:12px;font-weight:700" class="wov-txt">Broadcaster Set · ${bsStart} – ${bsEnd}</div><div style="font-size:10px" class="wov-sub">30 min na laatste sessie</div></div></div>
      </div></div>`;}
    });
    return rows.join('');
  }
  const weekItems=buildWeekOverzicht(race);

  return`
  <div class="content" style="padding-top:5px">
    ${statusBanner}
    <div class="card" style="padding:12px 14px"><div style="font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px;display:flex;align-items:center;gap:5px"><span style="width:5px;height:5px;background:var(--green);display:inline-block;border-radius:50%"></span>Onsite crew</div><div style="display:flex;flex-wrap:wrap;gap:6px">${names}</div></div>

    const rows=flights.map((f,i,arr)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0${i<arr.length-1?';border-bottom:1px solid var(--border)':''}">

      <span style="flex:1"></span>

    </div>`).join('');
    return`<div class="card" style="padding:10px 14px"><div style="font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px">✈ Vluchten</div>${rows}</div>`;})()}
    ${race.hotel?.name?`<div class="card"><div class="card-header"><div class="card-title"><i class="ti ti-building-hotel"></i>Hotel</div>${race.hotel.mapsUrl?`<a href="${race.hotel.mapsUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--blue);text-decoration:none;background:var(--blue-dim);border:1px solid rgba(37,99,235,.2);border-radius:20px;padding:3px 9px;white-space:nowrap"><i class="ti ti-map-pin" style="font-size:12px"></i>Maps</a>`:''}</div><div style="font-size:13px;font-weight:700;color:var(--txt);margin-bottom:4px">${race.hotel.name}</div><div style="font-size:11px;color:var(--txt2)">${race.hotel.addr}</div><div style="font-size:11px;color:var(--txt3);margin-top:2px">${race.hotel.tel}</div></div>`:''}
    <div class="card"><div class="card-header"><div class="card-title"><i class="ti ti-calendar-week"></i>Weekoverzicht</div></div><div>${weekItems}</div></div>
  </div>`;
}

/* ─── WEATHER ─── */
const WMO={0:'☀️ Helder',1:'🌤 Overwegend helder',2:'⛅ Gedeeltelijk bewolkt',3:'☁️ Bewolkt',45:'🌫 Mist',48:'🌫 Rijpende mist',51:'🌦 Lichte motregen',53:'🌦 Motregen',55:'🌧 Dichte motregen',61:'🌧 Lichte regen',63:'🌧 Regen',65:'🌧 Zware regen',71:'🌨 Lichte sneeuw',73:'🌨 Sneeuw',75:'❄️ Zware sneeuw',80:'🌦 Regenbuien',81:'🌧 Buien',82:'⛈ Zware buien',95:'⛈ Onweer',96:'⛈ Onweer + hagel',99:'⛈ Zwaar onweer'};
function wmoLabel(c){return WMO[c]||'–';}
async function loadWeather(race){
  const el=document.getElementById('weather-body');
  if(!el||!race.coords)return;
  const [lat,lon]=race.coords;
  const days=race.schedDays;
  const [yr,mo]=race.schedYM;
  const startDate=`${yr}-${String(mo+1).padStart(2,'0')}-${String(days[0]).padStart(2,'0')}`;
  const endDate=`${yr}-${String(mo+1).padStart(2,'0')}-${String(days[days.length-1]).padStart(2,'0')}`;
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max&timezone=auto&start_date=${startDate}&end_date=${endDate}`;
    const r=await fetch(url);
    const d=await r.json();
    if(!d.daily){el.textContent='Geen data beschikbaar';return;}
    const {time,weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max}=d.daily;
    const dayNames=['Zo','Ma','Di','Wo','Do','Vr','Za'];
    const hdrNames=race.schedHdr||time.map(t=>{const dt=new Date(t+'T12:00:00');return dayNames[dt.getDay()]+' '+dt.getDate();});
    el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(${time.length},1fr);gap:6px">${time.map((_,i)=>{
      const label=hdrNames[i]?hdrNames[i].split(' ').slice(0,2).join(' '):(dayNames[new Date(time[i]+'T12:00:00').getDay()]+' '+new Date(time[i]+'T12:00:00').getDate());
      const wc=weathercode[i];
      const icon=(wmoLabel(wc)||'').split(' ')[0];
      const desc=(wmoLabel(wc)||'').split(' ').slice(1).join(' ');
      const tmax=Math.round(temperature_2m_max[i]);
      const tmin=Math.round(temperature_2m_min[i]);
      const rain=precipitation_sum[i]?.toFixed(1)||'0';
      const wind=Math.round(windspeed_10m_max[i]);
      return`<div style="background:var(--stat-bg);border:1px solid var(--border);border-radius:10px;padding:8px 6px;text-align:center">
        <div style="font-size:9px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${label}</div>
        <div style="font-size:22px;line-height:1.1;margin-bottom:3px">${icon}</div>
        <div style="font-size:9px;color:var(--txt2);margin-bottom:4px;min-height:22px;line-height:1.3">${desc}</div>
        <div style="font-size:13px;font-weight:800;color:var(--txt)">${tmax}°</div>
        <div style="font-size:10px;color:var(--txt3)">${tmin}°</div>
        <div style="font-size:9px;color:var(--blue);margin-top:4px">💧 ${rain}mm</div>
        <div style="font-size:9px;color:var(--txt3)">💨 ${wind}km/u</div>
      </div>`;
    }).join('')}</div>`;
  }catch(e){el.textContent='Weersdata niet beschikbaar';}
}

/* ─── SCHEDULE ─── */
function renderScheduleWrapper(race){
  return`
  ${(()=>{const now2=Date.now();let next2=null;for(const s of race.sched){if(s[6]==='i'||s[6]==='b'||s[6]==='bt')continue;if(s[1]!=='b-motogp'&&s[1]!=='b-purple'&&s[1]!=='b-blue')continue;const st=getState(race,s,now2);if(st==='live'||st==='upcoming'){next2=s;break;}}if(!next2)return'';const isLive2=getState(race,next2,now2)==='live';const ts2=pad(next2[3])+':'+pad(next2[4]);const endT2=fmtEnd(race,next2);const dayLabel2=(()=>{const st=sStart(race,next2);const d=new Date(st);const days2=['Zo','Ma','Di','Wo','Do','Vr','Za'];return days2[d.getDay()]+' '+d.getDate()+' '+['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][d.getMonth()];})();return'<div style="background:var(--bg1);border-bottom:1px solid var(--border);padding:5px 14px;display:flex;align-items:center;gap:5px;overflow:hidden;white-space:nowrap">'+(isLive2?'<span class="live-pill" style="font-size:9px;padding:2px 7px;flex-shrink:0"><span class="rec-dot" style="width:5px;height:5px"></span>LIVE</span>':'<span style="font-size:9px;font-weight:700;background:var(--live-dim);color:var(--live);border:1px solid var(--live-border);border-radius:20px;padding:2px 7px;flex-shrink:0">Next session</span>')+'<span style="font-size:11px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0">'+next2[0]+'</span><span style="font-size:10px;font-weight:700;color:#111;flex-shrink:0">'+dayLabel2+'</span><span style="font-size:10px;color:var(--txt3);flex-shrink:0">·</span><span style="font-size:11px;font-weight:700;color:var(--txt);font-family:monospace;flex-shrink:0">'+ts2+(endT2?' → '+endT2:'')+'</span></div>';})()}
  <div id="sched-subpanel" class="content">${schedSubTab==='draaiboek'&&race.hasDraaiboek?draaiboekHTML():(`<div class="card"><div id="schedule-body"></div></div>`)}</div>`;

function switchSchedTab(tab,btn){
  schedSubTab=tab;
  document.querySelectorAll('.schema-subbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  if(sp)sp.innerHTML=tab==='draaiboek'&&race.hasDraaiboek?draaiboekHTML():'<div class="card"><div id="schedule-body"></div></div>';

const pad=n=>String(n).padStart(2,'0');
function buildNextSessionHTML(race){
  const now=Date.now();
  let next=null;
  for(const s of race.sched){if(s[6]==='i')continue;if(getState(race,s,now)==='upcoming'){next=s;break;}}
  if(!next)return'';
  const diff=sStart(race,next)-now;
  const ts=pad(next[3])+':'+pad(next[4]);
  const endT=fmtEnd(race,next);
  return next?
    `<div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:9px;font-weight:800;background:var(--live-dim);color:var(--live);border:1px solid var(--live-border);border-radius:20px;padding:2px 8px;white-space:nowrap;flex-shrink:0">Next session</span>
      <span style="font-size:12px;font-weight:600;color:var(--txt)">${next[0]}</span>
      <span style="font-size:12px;font-weight:700;color:var(--txt);font-family:monospace;margin-left:auto;white-space:nowrap">${ts}${endT?' → '+endT:''}</span>
    </div>`
  :'';
}
const fmtCD=ms=>{const m=Math.floor(ms/60000);if(m<60)return`in ${m}m`;const h=Math.floor(m/60),r=m%60;return r?`in ${h}u ${r}m`:`in ${h}u`;};
const sStart=(race,s)=>Date.UTC(...race.schedYM,race.schedDays[s[2]],s[3],s[4])-7200000;
const sEnd=(race,s)=>sStart(race,s)+(s[5]||1)*60000;
function getState(race,s,now){if(s[6]==='i')return now>=sEnd(race,s)?'done':'upcoming';if(now>=sEnd(race,s))return'done';if(now>=sStart(race,s))return'live';return'upcoming';}
function fmtEnd(race,s){if(!s[5])return'';const e=new Date(sEnd(race,s));return`${pad((e.getUTCHours()+2)%24)}:${pad(e.getUTCMinutes())}`;}
function badgeLbl(s){if(s[6]==='b')return'Ziggo';if(s[1]==='b-motogp')return'MotoGP';if(s[1]==='b-purple')return'Moto3';if(s[1]==='b-blue')return'Moto2';return'Info';}

function renderSchedulePanel(){
  const el=document.getElementById('schedule-body');if(!el)return;
  const race=RACES.find(r=>r.id===activeRace);
  const now=Date.now();
  const clk=document.getElementById('schema-clock');
  const n=new Date();
  if(clk)clk.innerHTML=`<span class="rec-dot" style="width:6px;height:6px"></span>${pad(n.getHours())}:${pad(n.getMinutes())}`;
  let nextIdx=-1;
  for(let i=0;i<race.sched.length;i++){if(race.sched[i][6]!=='i'&&getState(race,race.sched[i],now)==='upcoming'){nextIdx=i;break;}}
  const dg={};
  race.sched.forEach((s,i)=>{const d=s[2];if(!dg[d])dg[d]={s:[],ix:[]};dg[d].s.push(s);dg[d].ix.push(i);});
  // Sort each day's sessions by start time
  Object.keys(dg).forEach(d=>{
    const pairs=dg[d].s.map((s,j)=>({s,ix:dg[d].ix[j]}));
    pairs.sort((a,b)=>(a.s[3]*60+a.s[4])-(b.s[3]*60+b.s[4]));
    dg[d].s=pairs.map(p=>p.s);
    dg[d].ix=pairs.map(p=>p.ix);
  });
  const done=[],active=[];
  Object.keys(dg).forEach(d=>{const si=dg[d].s.filter(x=>x[6]!=='i');(si.length>0&&si.every(x=>getState(race,x,now)==='done')?done:active).push(Number(d));});
  // Compute activeDay (same logic as buildDay uses)
  const localNow2=new Date();
  const [yr2,mo2]=race.schedYM;
  let computedActiveDay=0;
  for(let i=0;i<race.schedDays.length;i++){
    const dd=race.schedDays[i];
    if(localNow2.getMonth()===mo2&&localNow2.getDate()===dd){
      computedActiveDay=i;
      if(localNow2.getHours()>=18&&i<race.schedDays.length-1)computedActiveDay=i+1;
      break;
    }
    if(localNow2.getMonth()>mo2||(localNow2.getMonth()===mo2&&localNow2.getDate()>dd))computedActiveDay=i+1;
  }
  computedActiveDay=Math.min(computedActiveDay,race.schedDays.length-1);
  // If the auto-active day changed, clear manual overrides for this race so new day auto-opens
  const activeDayKey=activeRace+'__activeDay';
  if(userToggledDays[activeDayKey]!==computedActiveDay){
    // Remove all manual overrides for this race
    Object.keys(userToggledDays).forEach(k=>{if(k.startsWith(activeRace+'-'))delete userToggledDays[k];});
    userToggledDays[activeDayKey]=computedActiveDay;
  }
  function buildDay(d){
    const si=dg[d].s.filter(x=>x[6]!=='i');
    const anyLive=si.some(x=>getState(race,x,now)==='live');
    const allDone=si.every(x=>getState(race,x,now)==='done');
    // Determine which day index is currently "active" to show open
    // Thursday (d===0) always open; for other days open if local date matches and before 18:00, else next day
    const localNow=new Date();
    const localH=localNow.getHours();
    const localDate=localNow.getDate();
    const localMonth=localNow.getMonth();
    // Find which schedDay index matches today
    const [yr,mo]=race.schedYM;
    let activeDay=0; // default: thursday
    for(let i=0;i<race.schedDays.length;i++){
      const dd=race.schedDays[i];
      if(localMonth===mo&&localDate===dd){
        activeDay=i;
        // After 18:00 on this day, advance to next day
        if(localH>=18&&i<race.schedDays.length-1)activeDay=i+1;
        break;
      }
      // If we're past this day, keep advancing
      if(localMonth>mo||(localMonth===mo&&localDate>dd))activeDay=i+1;
    }
    activeDay=Math.min(activeDay,race.schedDays.length-1);
    const startOpen=d===activeDay;
    const uid='day-'+race.id+'-'+d;
    const toggleKey=race.id+'-'+d;
    // Determine open state: manual override wins, otherwise use auto logic
    const isOpen=toggleKey in userToggledDays?userToggledDays[toggleKey]:startOpen;
    let note=allDone?' <span style="font-weight:400;font-size:9px;color:var(--txt3)">— afgerond</span>':anyLive?' <span style="font-weight:400;font-size:9px;color:var(--live)">— nu</span>':'';
    let html=`<div class="sched-section">
      <div class="day-header" onclick="toggleDay('${toggleKey}','${uid}')" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none">
        <span>${race.schedHdr[d]}${note}</span>
        <span id="${uid}-arr" style="font-size:10px;color:var(--acc);transition:transform .2s;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:5px;background:var(--bg3);border:1px solid var(--border);flex-shrink:0;transform:${isOpen?'rotate(0deg)':'rotate(-90deg)'}">▼</span>
      </div>
      <div id="${uid}" style="display:${isOpen?'block':'none'}">`;
    dg[d].s.forEach((s,li)=>{
      const i=dg[d].ix[li],state=getState(race,s,now),isNext=i===nextIdx;
      let cls='';
      if(s[6]==='i')cls='italic-row';
      else if(state==='done')cls='done';
      else if(state==='live')cls='live';
      else if(isNext)cls='upcoming-next';
      if(s[6]==='b')cls=(cls?cls+' ':'')+'broadcaster';
      if(s[6]==='g'&&state!=='done'&&state!=='live')cls=(cls?cls+' ':'')+'gp-race';
      if((s[0].includes('Tissot Sprint')||s[0].includes('Grand Prix'))&&state!=='done'&&state!=='live')cls=(cls?cls+' ':'')+'motogp-featured';
      const ts=`${pad(s[3])}:${pad(s[4])}`,endT=fmtEnd(race,s);
      let nm=s[0];
      if(s[6]==='bt')nm=`<span style="color:var(--txt);font-weight:600;font-style:normal">${nm}</span>`;
      else if(s[6]==='b')nm=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:4px"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>`+nm+` <span style="font-size:10px;color:var(--txt3);font-weight:400">Rob · Alvin</span>`;
      if(state==='live'&&s[6]!=='i')nm+=` <span class="live-pill" style="font-size:9px;padding:2px 6px;margin-left:4px"><span class="rec-dot" style="width:5px;height:5px"></span>LIVE</span>`;
      else if(isNext){const diff=sStart(race,s)-now;nm+=` <span style="font-size:10px;color:var(--txt3);margin-left:4px">${fmtCD(diff)}</span>`;}
      // Commentator tags for normal sessions
      const isMoto2=(s[1]==='b-blue'&&s[6]!=='b'&&s[6]!=='bt'&&s[6]!=='i');
      const isMoto3=(s[1]==='b-purple'&&s[6]!=='b'&&s[6]!=='bt'&&s[6]!=='i');
      const isGP=(s[1]==='b-motogp'&&s[6]!=='b'&&s[6]!=='bt'&&s[6]!=='i');
      const isFriPractice=(isGP&&s[2]===1&&s[3]===15&&s[4]===0); // MotoGP Practice fri 15:00
      const commentTag=(names)=>`<span style="font-size:9px;color:var(--txt3);font-weight:400;margin-left:5px">${names}</span>`;
      if(isMoto2||isMoto3) nm+=commentTag('Guido · Joey');
      else if(isGP) nm+=commentTag(isFriPractice?'Frank · Wilco · Barry':'Frank · Barry');
      const nameStyle=(s[6]!=='i'&&s[6]!=='b'&&s[6]!=='bt'&&state!=='done'&&state!=='live'&&!isNext)?'color:var(--txt);font-weight:700':'';
      const hideTime=(s[6]==='i'&&s[3]===0&&s[4]<10);
      const timeCell=hideTime?'':ts+(endT?`<span class="sched-end" style="margin-left:4px${s[6]==='bt'?';color:var(--txt)':''}">→ ${endT}</span>`:'');
      html+=`<div class="sched-row ${cls}"${s[6]==='bt'?' style="color:var(--txt)"':''}><span class="sched-time" ${s[6]==='bt'?'style="color:var(--txt)"':''}>${timeCell}</span><span class="sched-name"${nameStyle?` style="${nameStyle}"`:''}>${nm}</span></div>`;
    });
    return html+'</div></div><div style="height:2px;background:linear-gradient(90deg,var(--acc),rgba(249,115,22,0.15));border-radius:1px;margin:4px 0 8px"></div>';
  }
  let html='';
  active.forEach(d=>{html+=buildDay(d);});
  if(done.length>0){html+=`<div class="divider"><div class="divider-line"></div><span class="divider-label">Afgeronde dagen</span><div class="divider-line"></div></div>`;done.forEach(d=>{html+=buildDay(d);});}
  el.innerHTML=html;
}

function toggleDay(toggleKey,uid){
  const c=document.getElementById(uid);
  const a=document.getElementById(uid+'-arr');
  if(!c||!a)return;
  const nowOpen=c.style.display!=='none';
  // Flip state and record as manual override
  userToggledDays[toggleKey]=!nowOpen;
  c.style.display=nowOpen?'none':'block';
  a.style.transform=nowOpen?'rotate(-90deg)':'rotate(0deg)';
}

/* ─── CALENDAR ─── */
function renderCalendar(){
  const onsiteIds=RACES.map(r=>r.id);
  function calCard(e){
    const isOnsite=onsiteIds.includes(e.id)&&!e.done&&!e.current;
    let cls='cal-card';
    if(e.current)cls+=' current';
    if(e.done)cls+=' done';
    let winners='';
    if(e.done&&e.m3)winners=`<div class="cal-winners"><span class="cal-winner w-m3">🏆 Moto3 · ${e.m3}</span><span class="cal-winner w-m2">🏆 Moto2 · ${e.m2}</span><span class="cal-winner w-mgp">🏆 MotoGP · ${e.mgp}</span></div>`;
    const onsiteTag=isOnsite?`<div style="margin-top:5px"><span style="font-size:9px;font-weight:700;color:var(--acc);background:var(--acc-dim);border:1px solid var(--acc-border);border-radius:10px;padding:1px 7px;text-transform:uppercase;letter-spacing:.06em">📍 Onsite</span></div>`:'';
    const rn=e.round.replace('R','');
    return`<div class="${cls}" onclick="handleCalClick('${e.id}')"><div class="cal-round" style="${e.current?'background:var(--acc);color:#fff':''}">${rn}</div><div class="cal-main"><div class="cal-name">${e.name}</div><div class="cal-sub">${e.dates} · ${e.circuit}</div>${winners}${onsiteTag}</div><span class="cal-flag">${e.flag}</span></div>`;
  }
  const current=ALL_CAL.filter(r=>r.current).map(calCard).join('');
  const upcoming=ALL_CAL.filter(r=>!r.done&&!r.current).map(calCard).join('');
  const done=ALL_CAL.filter(r=>r.done).map(calCard).join('');
  return`
  <div class="gp-hero"><div><div class="gp-round">Seizoen 2026</div><div class="gp-name">Kalender · 22 rondes</div></div></div>
  <div class="content"><div>${current}${upcoming}<div class="divider"><div class="divider-line"></div><span class="divider-label">Afgeronde rondes</span><div class="divider-line"></div></div>${done}</div></div>`;
}

function handleCalClick(id){
  const race=RACES.find(r=>r.id===id);
  if(race){
    activeRace=id; activeSub='home'; schedSubTab='schema';
    document.querySelectorAll('.race-tab').forEach((b,i)=>b.classList.toggle('active',RACES[i].id===id));
    document.querySelectorAll('.sub-btn').forEach(b=>b.classList.toggle('active',b.dataset.sub==='home'));
    buildDropdown();
    updateLiveBar(); render(); window.scrollTo(0,0);
  }
}

/* ─── LIVE BAR ─── */
function updateLiveBar(){
  const race=RACES.find(r=>r.id===activeRace);if(!race)return;
  const now=Date.now();let live=null,next=null,nearLive=null;
  const TEN=10*60*1000;
  for(const s of race.sched){
    if(s[6]==='i')continue;
    const st=getState(race,s,now);
    const start=sStart(race,s);
    const end=start+(s[5]||0)*60000;
    // 10 min before start OR up to 10 min after end = show as NOW LIVE
    if((now>=start-TEN&&now<=end+TEN)&&!nearLive)nearLive=s;
    if(st==='live'&&!live)live=s;
    if(st==='upcoming'&&!next)next=s;
  }
  const bar=document.getElementById('global-live-bar'),lbl=document.getElementById('global-live-session');
  if(!bar||!lbl)return;
  if(nearLive){
    bar.classList.remove('idle');
    bar.style.background='rgba(180,0,0,0.92)';
    bar.style.borderBottomColor='rgba(220,38,38,0.6)';
    const endT=fmtEnd(race,nearLive);
    lbl.innerHTML=`<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);border-radius:20px;padding:2px 8px 2px 5px;font-size:9px;font-weight:800;letter-spacing:.05em;color:#fff;text-transform:uppercase;margin-right:6px"><span class="rec-dot" style="width:7px;height:7px;background:#fff"></span>NOW LIVE</span><strong style="color:#fff">${nearLive[0]}</strong>${endT?'<span style="color:rgba(255,255,255,0.65);font-weight:400"> → '+endT+'</span>':''}`;
  } else if(live){
    bar.classList.remove('idle');
    bar.style.background='';bar.style.borderBottomColor='';
    const endT=fmtEnd(race,live);
    lbl.innerHTML=`<span class="live-pill" style="font-size:9px;padding:2px 7px;margin-right:4px"><span class="rec-dot" style="width:5px;height:5px"></span>LIVE</span> <strong>${live[0]}</strong>${endT?' <span style="color:rgba(255,255,255,0.6);font-weight:400">→ '+endT+'</span>':''}`;
  } else {
    bar.classList.add('idle');
    bar.style.background='';bar.style.borderBottomColor='';
    if(next){const diff=sStart(race,next)-now;lbl.innerHTML=`<strong style="color:#222">${next[0]}</strong> <span style="color:#888;font-weight:400">${pad(next[3])}:${pad(next[4])} · ${fmtCD(diff)}</span>`;}
    else{lbl.innerHTML=`<span style="color:#888">Geen live sessie</span>`;}
  }
}

function toggleTheme(){const html=document.documentElement;const isDark=html.getAttribute('data-theme')==='dark';html.setAttribute('data-theme',isDark?'light':'dark');setThemeIcon(!isDark);localStorage.setItem('theme',isDark?'light':'dark');}

/* ─── CAROUSEL ─── */
const _carouselState={};
function carouselMove(id,dir){
  const track=document.getElementById(id+'-track');
  if(!track)return;
  const n=track.children.length;
  if(!_carouselState[id])_carouselState[id]=0;
  _carouselState[id]=(_carouselState[id]+dir+n)%n;
  track.style.transform=`translateX(-${_carouselState[id]*100}%)`;
  document.querySelectorAll('#'+id+'-dots .hotel-carousel-dot').forEach((d,i)=>d.classList.toggle('active',i===_carouselState[id]));
}
function carouselGo(id,idx){
  _carouselState[id]=idx;
  const track=document.getElementById(id+'-track');
  if(track)track.style.transform=`translateX(-${idx*100}%)`;
  document.querySelectorAll('#'+id+'-dots .hotel-carousel-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

/* ─── ADMIN PANEL ─── */
let adminLoggedIn=false;let isRecording=false;let voiceRec=null;let adminPassword='';
/* Set this to the deployed Cloudflare Worker URL, e.g. 'https://mgp2026-admin.<account>.workers.dev' */
const ADMIN_WORKER_URL='';

function updateTime(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const el=document.getElementById('time-display');
  if(el)el.textContent=h+':'+m;
}
setInterval(updateTime,10000);updateTime();

function openAdminModal(){
  const modal=document.getElementById('admin-modal');
  if(modal)modal.classList.add('open');
}
function closeAdminModal(){
  const modal=document.getElementById('admin-modal');
  if(modal)modal.classList.remove('open');
  adminLogout();
}
async function adminLogin(){
  if(!ADMIN_WORKER_URL){showAdminStatus('ADMIN_WORKER_URL is not configured in index.html','error');return;}
  const pwd=document.getElementById('admin-password');
  const pass=pwd?pwd.value:'';
  if(!pass){showAdminStatus('Enter a password','error');return;}
  showAdminStatus('Verifying...','info');
  try{
    const res=await fetch(ADMIN_WORKER_URL.replace(/\/$/,'')+'/verify',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pass})
    });
    if(!res.ok){
      const data=await res.json().catch(()=>({}));
      showAdminStatus(data.error||('Login failed ('+res.status+')'),'error');
      return;
    }
    adminLoggedIn=true;adminPassword=pass;
    const authSection=document.getElementById('admin-auth-section');
    const contentSection=document.getElementById('admin-content-section');
    if(authSection)authSection.style.display='none';
    if(contentSection)contentSection.style.display='block';
    showAdminStatus('Login successful!','success');
  }catch(err){
    showAdminStatus('Network error: '+err.message,'error');
  }
}
function adminLogout(){
  adminLoggedIn=false;adminPassword='';
  const authSection=document.getElementById('admin-auth-section');
  const contentSection=document.getElementById('admin-content-section');
  if(authSection)authSection.style.display='block';
  if(contentSection)contentSection.style.display='none';
  const pwd=document.getElementById('admin-password');
  if(pwd)pwd.value='';
  const prompt=document.getElementById('admin-prompt');
  if(prompt)prompt.value='';
  const status=document.getElementById('admin-status');
  if(status)status.innerHTML='';
}
function showAdminStatus(msg,type){
  const status=document.getElementById('admin-status');
  if(status){
    status.className='admin-status '+type;
    status.textContent=msg;
  }
}
async function submitAdminPrompt(){
  if(!adminLoggedIn)return;
  if(!ADMIN_WORKER_URL){showAdminStatus('ADMIN_WORKER_URL is not configured in index.html','error');return;}
  const promptEl=document.getElementById('admin-prompt');
  const text=promptEl?promptEl.value.trim():'';
  if(!text){showAdminStatus('Please describe your change','error');return;}
  const btn=event.target;
  btn.disabled=true;
  btn.textContent='Applying...';
  showAdminStatus('Claude is rewriting the app and committing to GitHub. This may take 30–90 seconds...','info');
  try{
    const res=await fetch(ADMIN_WORKER_URL.replace(/\/$/,'')+'/apply',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:adminPassword,prompt:text})
    });
    const data=await res.json().catch(()=>({}));
    if(!res.ok){
      showAdminStatus(data.error||('Apply failed ('+res.status+')'),'error');
      btn.disabled=false;btn.textContent='Apply Change';
      return;
    }
    const shortSha=(data.commit||'').slice(0,7);
    showAdminStatus('Committed '+shortSha+'. Reloading in 3s...','success');
    setTimeout(()=>{window.location.reload();},3000);
  }catch(err){
    showAdminStatus('Network error: '+err.message,'error');
    btn.disabled=false;btn.textContent='Apply Change';
  }
}
function toggleVoiceInput(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showAdminStatus('Voice input not supported in this browser','error');return;}
  const btn=document.getElementById('admin-voice-btn');
  const label=document.getElementById('voice-btn-text');
  if(!isRecording){
    voiceRec=new SR();
    voiceRec.lang='nl-NL';
    voiceRec.interimResults=false;
    voiceRec.maxAlternatives=1;
    voiceRec.onresult=(e)=>{
      const text=e.results[0][0].transcript;
      const promptEl=document.getElementById('admin-prompt');
      if(promptEl)promptEl.value=(promptEl.value?promptEl.value+' ':'')+text;
      showAdminStatus('Voice transcribed!','success');
    };
    voiceRec.onerror=(e)=>showAdminStatus('Voice error: '+e.error,'error');
    voiceRec.onend=()=>{
      isRecording=false;
      if(btn)btn.classList.remove('recording');
      if(label)label.textContent='Voice';
    };
    try{voiceRec.start();}catch(err){showAdminStatus('Voice start failed: '+err.message,'error');return;}
    isRecording=true;
    if(btn)btn.classList.add('recording');
    if(label)label.textContent='Stop';
    showAdminStatus('Recording... click again to stop','info');
  } else {
    if(voiceRec)voiceRec.stop();
  }
}

/* ─── RESTAURANT TOGGLE ─── */
function toggleRestaurant(el){
  const panel=el.querySelector('.rest-hover-panel');
  if(!panel)return;
  // Close other open restaurants
  document.querySelectorAll('.rest-item').forEach(item=>{
    if(item!==el){
      const p=item.querySelector('.rest-hover-panel');
      if(p)p.classList.remove('open');
    }
  });
  // Toggle current
  panel.classList.toggle('open');
}
